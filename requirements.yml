---
collections:
  # SSH authorized_key, profile_tasks/timer callbacks.
  # Pinned <10.0.0 for compatibility with Ansible 2.16.x (Ubuntu apt).
  # Upgrade this when you move to ansible-core 2.17+ (pip install ansible).
  - name: ansible.posix
    version: ">=1.5.0"

  # General-purpose extras: pam_limits, timezone, etc.
  # community.general 9.x supports ansible-core 2.15/2.16.
  - name: community.general
    version: ">=9.0.0,<10.0.0"

  # AWS EC2 lifecycle management (provision, stop, start, terminate, status).
  # Requires: boto3 in .venv (bash scripts/install_dependencies.sh).
  # ec2_provision uses network_interfaces + ec2_vpc_subnet_info (amazon.aws >= 8.2.0).
  - name: amazon.aws
    version: ">=8.2.0,<9.0.0"
