[defaults]
# Generated from .env — run: bash scripts/render_inventory_from_env.sh
inventory                 = inventory/hosts.autogen.yml
host_key_checking         = False
interpreter_python        = auto_silent
retry_files_enabled       = False

# Roles are in roles/ (repo root), not in playbooks/roles/.
# Scripts always cd to the repo root before running ansible-playbook.
roles_path                = roles

# Parallelism — 10 forks covers small-to-medium EC2 fleets easily on free tier.
forks                     = 10

# Only gather facts when they haven't been cached or when the play needs them.
gathering                 = smart

# Fact cache: persists gathered facts across runs so subsequent playbooks skip
# the Gathering Facts step (stays hot for 1 h).  Dir is auto-created on first run.
fact_caching              = jsonfile
fact_caching_connection   = /tmp/ansible_facts_cache
fact_caching_timeout      = 3600

# Human-readable YAML output (ansible-core 2.13+ built-in way).
# community.general.yaml was removed in community.general 12.0.0; use this instead.
stdout_callback            = ansible.builtin.yaml

# Timing per task + total — useful for spotting slow tasks.
callbacks_enabled          = ansible.posix.profile_tasks, ansible.posix.timer

# Less noise: hide hosts that had nothing to do and skip deprecation spam.
display_skipped_hosts      = False
deprecation_warnings       = True

# Show a diff for any file change (same effect as passing --diff on CLI).
diff                       = True

# Show custom stats at the end of each run.
show_custom_stats          = True

[inventory]
enable_plugins = host_list, script, auto, yaml, ini

[ssh_connection]
# Pipelining: send Python scripts over stdin instead of writing temp files.
# Speeds up every task by ~30 %.  Requires "Defaults !requiretty" in sudoers
# (Amazon Linux 2023 default) — disable if you hit "requiretty" errors.
pipelining = True

# Multiplex SSH connections; reduces per-task TCP handshake overhead.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
