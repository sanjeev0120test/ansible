# Example shape only. Real file is generated (gitignored) as hosts.autogen.yml
# from .env via: bash scripts/render_inventory_from_env.sh
---
all:
  children:
    linux:
      hosts:
        server1:
          ansible_host: "<set EC2_HOST_SERVER1 in .env>"
        server2:
          ansible_host: "<EC2_HOST_SERVER2>"
        server3:
          ansible_host: "<EC2_HOST_SERVER3>"
        client:
          ansible_host: "<EC2_HOST_CLIENT>"
      vars:
        ansible_user: ec2-user
        ansible_python_interpreter: auto_silent
